<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>정상 접수되었습니다</title>
    <meta
      name="description"
      content="소상공인 자동화 무료 진단 조사 접수가 완료되었습니다."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="thanks-page">
        <section class="panel thanks-panel">
          <p class="eyebrow">submission received</p>
          <h1 id="thanks-title">정상 접수되었습니다.</h1>
          <p class="hero-text">
            소중한 시간 내어 설문에 응답해주셔서 감사합니다. 남겨주신 내용을 검토한 뒤,
            입력하신 연락처로 순차적으로 안내드리겠습니다.
          </p>
          <div class="thanks-notes">
            <p>응답이 많을 경우 검토에 시간이 조금 더 걸릴 수 있습니다.</p>
            <p>추가 안내가 필요한 경우 이메일 또는 남겨주신 전화번호로 연락드릴 수 있습니다.</p>
          </div>
          <div class="hero-actions">
            <a class="button primary" href="./index.html">처음으로 돌아가기</a>
          </div>
        </section>
      </main>
    </div>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const email = params.get("email");
        const title = document.getElementById("thanks-title");
        if (email) {
          title.textContent = email + "님, 정상 접수되었습니다.";
        }
      })();
    </script>
  </body>
</html>
